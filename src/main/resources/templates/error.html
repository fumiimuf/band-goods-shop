<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title th:text="#{title.common.error}"></title>

<link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
<link rel="stylesheet" th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.css}">
</head>
<body class="bg-light d-flex align-items-center min-vh-100">
	<div class="container">
		<div class="row justify-content-center">
			<div class="col-12 col-sm-10 col-md-8 col-lg-6" style="max-width: 500px;">
				<div class="card border-0 shadow-sm rounded-4 p-4 p-sm-5 text-center">
					<!-- アイコン -->
					<div class="mb-4">
						<i class="bi bi-exclamation-circle-fill text-danger display-1"></i>
					</div>
					<!-- お詫びメッセージ -->
					<h1 class="h4 fw-bold text-dark mb-2" th:text="#{common.error.apology}"></h1>
					<!-- エラー発生メッセージ -->
					<p class="text-secondary fs-5 mb-5" th:text="#{common.error.message}"></p>

					<form th:action="@{/logout}" method="post" class="d-grid">
						<!-- ログイン画面へ戻るボタン -->
						<button type="submit" class="btn btn-dark btn-lg fw-bold rounded-3 py-3" th:text="#{common.error.btn.toLogin}"></button>
					</form>
				</div>
			</div>
		</div>
	</div>
	<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}" defer></script>
</body>
</html>
