<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- CSS読込 -->
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">

    <title th:text="#{title.userRegister}"></title>
</head>
<body>
    <div class="container mt-5 mx-auto" style="max-width: 400px;">
    	<!-- 大見出し -->
    	<h1 class="mb-3 text-center" th:text="#{label.userRegister.title}"></h1>
    	
    	<hr>
    
    	<!-- 入力フォーム -->
    	<form th:action="@{/user/register}" th:object="${userRegisterForm}" method="post">
    		
    		<!-- 氏名 -->
    		<div class="mb-3">
    			<label class="form-label" th:text="#{label.userRegister.name}"></label>
    			<input type="text" class="form-control" th:field="*{name}" th:errorclass="is-invalid">
    			<div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
    		</div>
    		
    		<!-- メールアドレス -->
    		<div class="mb-3">
    			<label class="form-label" th:text="#{label.userRegister.email}"></label>
    			<input type="email" class="form-control" th:field="*{email}" th:errorclass="is-invalid">
    			<div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
    		</div>
    		
    		<!-- パスワード -->
    		<div class="mb-3">
    			<label class="form-label" th:text="#{label.userRegister.password}"></label>
    			<input type="password" class="form-control" th:field="*{password}" th:errorclass="is-invalid">
    			<div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
    		</div>
    		
    		<!-- 郵便番号 -->
    		<div class="mb-3">
    			<label class="form-label" th:text="#{label.userRegister.zipCode}"></label>
    			<input type="text" class="form-control" th:field="*{zipCode}" th:errorclass="is-invalid">
    			<div class="invalid-feedback" th:if="${#fields.hasErrors('zipCode')}" th:errors="*{zipCode}"></div>
    		</div>
    		
    		<!-- 住所 -->
    		<div class="mb-3">
    			<label class="form-label" th:text="#{label.userRegister.address}"></label>
    			<textarea class="form-control" th:field="*{address}" rows="3" th:errorclass="is-invalid"></textarea>
    			<div class="invalid-feedback" th:if="${#fields.hasErrors('address')}" th:errors="*{address}"></div>
    		</div>
    		
    		<!-- 登録ボタン -->
    		<div class="d-grid mb-3">
    			<button type="submit" class="btn btn-primary btn-lg" th:text="#{btn.userRegister}"></button>
    		</div>
    		
    		<!-- リンク -->
    		<div class="mb-3 text-center">
    			<a th:href="@{/login}" class="text-decoration-none" th:text="#{link.userRegister.toLogin}"></a>
    		</div>
    		
    	</form>
    </div>
    <!-- JS読込 -->
    <script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}" defer></script>
</body>
</html>
