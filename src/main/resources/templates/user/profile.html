<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" 
      layout:decorate="~{layout/layout}">
<head>
    <title>ユーザーページ</title>
</head>
<body class="bg-light">
    <main layout:fragment="content">
        <div class="container my-5" style="max-width: 600px;">
            
            <h1 class="h3 fw-bold mb-4 text-dark border-bottom pb-2">登録情報の確認</h1>
            
            <div class="card border-secondary-subtle rounded-4 shadow-sm p-4 mb-4 bg-white">
                
                <div class="mb-4">
                    <label class="small text-muted fw-bold mb-1">氏名</label>
                    <div class="fs-5 fw-bold text-dark" th:text="${user.name}"></div>
                </div>
                
                <div class="mb-4">
                    <label class="small text-muted fw-bold mb-1">メールアドレス</label>
                    <div class="fs-5 fw-bold text-dark" th:text="${user.email}"></div>
                </div>
                
                <div class="mb-4">
                    <label class="small text-muted fw-bold mb-1">郵便番号</label>
                    <div class="fs-5 fw-bold text-dark" th:text="${user.zipCode}"></div>
                </div>
                
                <div class="mb-0">
                    <label class="small text-muted fw-bold mb-1">住所</label>
                    <div class="fs-5 fw-bold text-dark lh-base" th:text="${user.address}"></div>
                </div>
                
            </div>
            
            <div class="d-flex gap-3 justify-content-center mt-4">
                <a th:href="@{/goods/index}" class="btn btn-outline-dark px-4 py-2 fw-bold rounded-2">
                    戻る
                </a>
                <a th:href="@{/user/edit}" class="btn btn-dark px-4 py-2 fw-bold rounded-2" style="background-color: #2c3e50;">
                    編集
                </a>
            </div>
            
        </div>
    </main>
</body>
</html>
