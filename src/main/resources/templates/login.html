<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

<!-- CSS読込 -->
<link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">

<!-- JS読込 -->
<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}" defer></script>

<title>ログイン</title>
</head>
<body>
	<div class="container w-50">
		<h1 class="mb-3 text-center">ログイン</h1>

		<!-- エラーメッセージ -->
		<div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show mb-4" role="alert">
			メールアドレスまたはパスワードが正しくありません。
			<button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
		</div>

		<!-- 入力フォーム -->
		<form th:action="@{/login}" method="post">
			<!--メールアドレス-->
			<div class="mb-3">
				<label class="form-label">メールアドレス</label> <br> <input type="email" name="email" class="form-control">
			</div>
			<!--パスワード-->
			<div class="mb-3">
				<label class="form-label">パスワード</label> <br> <input type="password" name="password" class="form-control">
			</div>
			<!--ログインボタン-->
			<div class="d-grid mb-3">
				<button type="submit" class="btn btn-primary btn-lg">ログイン</button>
			</div>

			<hr class="text-secondary my-4 opacity-25">

			<!--リンク-->
			<div class="mb-3 text-center">
				<p class="text-muted small mb-1">ユーザー登録がまだなら</p>
				<a th:href="@{/user/register}" class="text-decoration-none">新規ユーザー登録はこちら</a>
			</div>
		</form>
	</div>

</body>
</html>
