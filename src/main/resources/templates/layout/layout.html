<!DOCTYPE html>
<!-- 1. layout機能を使うための宣言 (xmlns:layout) が必須です -->
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    
    <!-- 全画面共通のCSS（ここで一括管理！） -->
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    
    <!-- 全画面共通のJavaScript -->
    <script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}" defer></script>
    
    <title></title>
</head>
<body>
    <!-- 2. 【ヘッダー部品】をここにガッチャンコとはめ込みます -->
    <!-- 住所は「layoutフォルダのheaderファイルの、th:fragment="header"という名前の部品」という意味です -->
    <header th:replace="~{layout/header::header}"></header>

    <!-- 3. 【穴（フラグメント）】を作ります。ここに各画面の中身が入り込みます -->
    <!-- 名前を "content" と決めておきます -->
    <main layout:fragment="content"></main>
</body>
</html>
