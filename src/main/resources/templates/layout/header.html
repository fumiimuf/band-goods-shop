<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
		xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head></head>
<body>
    <header th:fragment="header" class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm">
        <div class="container-fluid">
            <!-- サイト名 -->
            <div sec:authorize="hasRole('USER')" class="d-flex align-items-center">
                <a class="navbar-brand fw-bold" th:href="@{/goods/index}" th:text="#{label.header.siteName}"></a>
            </div>
            
            <div sec:authorize="hasRole('ADMIN')" class="d-flex align-items-center">
            	<a class="navbar-brand fw-bold" th:href="@{/admin/goods/index}" th:text="#{label.header.admin.siteName}"></a>
           		
           		<span class="badge bg-primary small" th:text="#{label.header.adminBadge}"></span>
            </div>
            
            <button class="navbar-toggler" type="button"
            		data-bs-toggle="collapse"
            		data-bs-target="#navbarNavDropdown"
            		aria-expanded="false"
            		>
            	<span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse justify-content-end" id="navbarNavDropdown">
                <ul class="navbar-nav flex-row align-items-center w-100 justify-content-end py-2 py-lg-0">
                    
                    <!-- 1. 一般ユーザー用メニュー (sec:authorizeで制御) -->
                    <th:block sec:authorize="hasRole('USER')">
                        <li class="nav-item me-2 pe-3 text-white border-end">
                            <span th:text="#{common.user.honorific(${#authentication.principal.name})}"></span>
                        </li>
                        <li class="nav-item px-2">
                            <a class="nav-link text-white" th:href="@{/goods/index}" th:text="#{btn.header.goodsIndex}"></a>
                        </li>
                        <li class="nav-item px-2">
                            <a class="nav-link text-white font-weight-bold" th:href="@{/cart/index}">
                                [[#{btn.header.cart}]](<span data-header-cart-count class="text-danger" th:text="${cartCount != null ? cartCount : 0}"></span>)
                            </a>
                        </li>
                        <li class="nav-item px-2">
                            <a class="nav-link text-white" th:href="@{/user/profile}" th:text="#{btn.header.userProfile}"></a>
                        </li>
                        <li class="nav-item px-2">
                            <a class="nav-link text-white" th:href="@{/order/history}" th:text="#{btn.header.orderHistory}"></a>
                        </li>
                    </th:block>

                    <!-- 2. 管理者用メニュー (Admin用) -->
                    <th:block sec:authorize="hasRole('ADMIN')">
                        <li class="nav-item px-2">
                            <a class="nav-link text-white" th:href="@{/admin/goods/index}" th:text="#{btn.header.admin.goodsIndex}"></a>
                        </li>
                        
                        <li class="nav-item px-2">
                            <a class="nav-link text-white" th:href="@{/admin/user/list}" th:text="#{btn.header.admin.userList}"></a>
                        </li>
                        
                        <li class="nav-item px-2">
                        	<a class="nav-link text-white" th:href="@{/admin/order/list}" th:text="#{btn.header.admin.orderList}"></a>
                        </li>
                    </th:block>

                    <!-- 3. ログアウトボタン (共通) -->
                    <li class="nav-item ms-2 ms-sm-3">
                        <form th:action="@{/logout}" method="post">
                            <button type="submit" class="btn btn-outline-light btn-sm" th:text="#{btn.header.logout}"></button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </header>
</body>
</html>
