<!DOCTYPE html>
<!-- 1. layout:decorate で「どの外枠（ケース）を使うか」を指定します -->
<!-- 住所は「layoutフォルダのlayoutファイル」という意味です -->
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">
      
<head>
	<meta name="_csrf" th:content="${_csrf.token}"/>
	<meta name="_csrf_header" th:content="${_csrf.headerName}"/>
	<title>カート内容</title>
</head>
<body>
	
	<div layout:fragment="content" class="container mt-4">
		
		<div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 11">
	       <div id="errorToast" class="toast align-items-center text-white bg-danger border-0" role="alert" aria-live="assertive" aria-atomic="true">
	           <div class="d-flex">
	               <div class="toast-body">
	                   </div>
	               <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
	           </div>
	       </div>
		</div>
		
		<div class="d-flex justify-content-between align-items-center mb-4">
			<h1 th:text="${loginUserName} + 'さんのカート'"></h1>
			<form th:action="@{/cart/clear}" method="post" class="d-inline" onsubmit="return confirm('本当にカートを空にしますか？')">
				<button type="submit" class="btn btn-danger btn-sm">カートを空にする</button>
			</form>
		</div>
		

		<table class="table table-hover align-middle mb-4">
			<thead>
				<tr>
					<th>商品情報</th>
					<th>単価</th>
					<th>数量</th>
					<th>小計</th>
					<th>操作</th>
				</tr>
			</thead>
			<tbody>
				<!-- 商品情報(商品画像＋商品名) -->
				<tr th:each="item : ${cartList}">
					<td>
						<img th:src="@{/images/{img}(img=${item.image})}" alt="商品画像" width=""> <span th:text="${item.name}"></span>
					</td>
					<!-- 単価 -->
					<td th:text="|¥ ${#numbers.formatInteger(item.price, 3, 'COMMA')}|"></td>
					<!-- 数量(ドロップダウン) -->
					<td>
						<form class="update-quantity-form">
							<input type="hidden" name="goodsId" th:value="${item.goodsId}">
							<select name="quantity" class="form-select form-select-sm update-quantity-select">
								<option th:each="i : ${#numbers.sequence(1, 10)}" th:value="${i}" th:text="${i}" th:selected="${i == item.quantity}"></option>
							</select>
						</form>
					</td>
					<!-- 小計 -->
					<td th:text="|¥ ${#numbers.formatInteger(item.price * item.quantity, 3, 'COMMA')}|"></td>
					<!-- 削除ボタン -->
					<td>
						<form th:action="@{/cart/delete}" method="post">
							<input type="hidden" name="goodsId" th:value="${item.goodsId}">
							<button type="submit" class="btn btn-danger btn-sm">削除</button>
						</form>
					</td>
				</tr>
			</tbody>
		</table>

		<h3 class="mt-4 mb-4">
    		合計金額(税込み) : 
		    <span data-total-amount 
		    th:text="${totalAmount != null} ? '¥' + ${#numbers.formatInteger(totalAmount, 3, 'COMMA')} : '¥0'"></span>
		</h3>
		
		<a th:href="@{/goods}" class="btn btn-secondary">戻る</a>
		<a th:href="@{/checkout}" class="btn btn-success">購入へ進む</a>
	</div>
</body>
</html>
