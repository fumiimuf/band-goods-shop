<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" 
      layout:decorate="~{layout/layout}">
<head>
    <title>購入履歴</title>
</head>
<body>
    <main layout:fragment="content" class="container my-5" style="max-width: 900px;">
        <h1 class="mb-4">購入履歴</h1>
        
        <div th:if="${#lists.isEmpty(historyList)}" class="text-center my-5">
            <p class="text-muted">購入履歴はありません。</p>
        </div>

        <div th:unless="${#lists.isEmpty(historyList)}" th:each="item : ${historyList}" class="card mb-4 shadow-sm border">
            
            <div class="card-header bg-light py-3 border-bottom">
                <div class="row g-3">
                    <div class="col-12 col-md-4">
                        <div class="mb-1">
                            <span class="text-muted small fw-bold">注文日時：</span>
                            <span class="small" th:text="${#temporals.format(item.order.orderedAt, 'yyyy年MM月dd日')}"></span>
                        </div>
                        <div>
                            <span class="text-muted small fw-bold">合計金額：</span>
                            <span class="fw-bold text-danger" th:text="'¥ ' + ${#numbers.formatInteger(item.order.totalPrice, 1, 'COMMA')}"></span>
                        </div>
                    </div>
                    <div class="col-12 col-md-8 text-md-end">
                        <span class="text-muted small fw-bold">お届け先：</span>
                        <span class="small" th:text="'〒' + ${item.order.orderedZipCode} + ' ' + ${item.order.orderedAddress}"></span>
                        <div class="text-muted small mt-1">
                            <span th:text="${item.order.orderedName}"></span> 様
                        </div>
                    </div>
                </div>
            </div>

            <div class="card-body bg-white py-4">
                <div th:each="detail, stat : ${item.details}" 
                     class="row align-items-center" 
                     th:classappend="${!stat.last} ? 'mb-4 border-bottom pb-3' : ''">
                    
                    <div class="col-3 col-sm-2 col-md-1">
                        <img th:src="${detail.orderedImage}" class="img-fluid rounded border shadow-sm" alt="商品画像" style="max-height: 70px; object-fit: cover;">
                    </div>
                    
                    <div class="col-9 col-sm-6 col-md-7">
                        <h6 class="mb-0 fw-bold text-dark" th:text="${detail.orderedName}">バンドTシャツ</h6>
                    </div>
                    
                    <div class="col-12 col-sm-4 col-md-4 text-sm-end mt-2 mt-sm-0">
                        <span class="text-muted small" th:text="'単価: ¥ ' + ${#numbers.formatInteger(detail.orderedPrice, 1, 'COMMA')}">単価: ¥ 2,500</span>
                        <span class="badge bg-secondary ms-2" th:text="${detail.quantity} + ' 個'">1 個</span>
                    </div>
                </div>
            </div>
            
        </div>

        <div class="text-center mt-5">
            <a th:href="@{/goods/index}" class="btn btn-outline-secondary px-4 py-2 shadow-sm">
                <i class="bi bi-arrow-left me-2"></i>グッズ一覧へ戻る
            </a>
        </div>
        
    </main>
</body>
</html>
