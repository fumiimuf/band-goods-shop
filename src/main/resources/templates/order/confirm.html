<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/layout}">
<head>
<title th:text="#{title.order.confirm}"></title>
</head>
<body>

	<main layout:fragment="content">
		<div class="container mt-4" style="max-width: 800px;">
			<!-- 大見出し -->
			<h1 th:text="#{label.order.confirm.title}"></h1>

			<hr>

			<div class="card mb-4 shadow-sm">
				<div class="card-header bg-dark text-white fw-bold py-3">
					<span class="bi bi-truck me-2" th:text="#{label.order.confirm.delivery}"></span>
				</div>
				<div class="card-body p-4 border border-top-0 rounded-bottom">
					<div class="mb-3">
						<div class="text-muted small d-block mb-1" th:text="#{label.order.confirm.zipCode}"></div>
						<p class="h5 mb-0 fw-bold" th:text="|〒 ${user.zipCode}|"></p>
					</div>
					<div class="mb-3">
						<div class="text-muted small d-block mb-1" th:text="#{label.order.confirm.address}"></div>
						<p class="h5 mb-0 fw-bold" th:text="${user.address}"></p>
					</div>
					<div class="mb-0">
						<div class="text-muted small d-block mb-1" th:text="#{label.order.confirm.deliveryName}"></div>
						<p class="h5 mb-0 fw-bold" th:text="|${user.name} 様|"></p>
					</div>
				</div>
			</div>

			<div class="card shadow-sm">
				<div class="card-header bg-dark text-white fw-bold py-3">
					<span class="bi bi-bag-check me-2" th:text="#{label.order.confirm.item}"></span>
				</div>
				<div class="card-body">
					<table class="table table-hover align-middle mb-0">
						<thead class="table-light text-start">
							<tr>
								<th class="text-center" th:text="#{label.order.confirm.image}"></th>
								<th class="text-start" th:text="#{label.order.confirm.goodsName}"></th>
								<th class="text-center" th:text="#{label.order.confirm.price}"></th>
								<th class="text-center" th:text="#{label.order.confirm.quantity}"></th>
								<th class="text-center" th:text="#{label.order.confirm.subtotal}"></th>
							</tr>
						</thead>
						<tbody>
							<tr th:each="item : ${cartList}">
								<td class="">
									<div class="d-flex align-items-center justify-content-center" style="height: 150px;">
										<img th:src="${item.getImageUrl()}" class="w-75 h-75 object-fit-contain mx-auto" th:alt="${item.goods.name}">
									</div>
								</td>
								<td class="fw-bold" th:text="${item.goods.name}"></td>
								<td class="" th:text="|¥ ${#numbers.formatInteger(item.goods.price, 3, 'COMMA')}|"></td>
								<td class="" th:text="|${item.quantity} 個|"></td>
								<td class="fw-bold text-primary" th:text="|¥ ${#numbers.formatInteger(item.subtotal, 3, 'COMMA')}|"></td>
							</tr>
						</tbody>
					</table>
				</div>
				
				<hr>
				
				<div class="mt-3 text-end">
					<span class="text-danger fw-bold fs-2" th:text="#{label.order.confirm.totalAmount}"></span>
					<span class="text-danger fw-bold fs-2" th:text="|¥ ${#numbers.formatInteger(totalAmount, 3, 'COMMA')}|"></span>
				</div>
				
			</div>

			<div class="d-flex gap-2">
				<a th:href="@{/cart/index}" class="btn btn-outline-secondary" th:text="#{btn.order.confirm.back}"></a>
				
				<form th:action="@{/order/complete}" method="post">
					<button type="submit" class="btn btn-success btn-sm" th:text="#{btn.order.confirm.submit}"></button>
				</form>
			</div>
		</div>
	</main>

</body>
</html>
