<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">
<head>
    <title th:text="#{title.admin.user.list}"></title>
</head>
<body>

    <main layout:fragment="content" >
    	<div class="container mt-4" style="max-width: 800px;">
    		<!-- 大見出し -->
	        <h1 class="h2 fw-bold mb-4 border-bottom pb-2" th:text="#{label.admin.user.list.title}"></h1>
	
			<div class="mb-4">
	            <form th:action="@{/admin/user/list}" method="get">
	            	<div class="d-flex justify-content-end align-items-center gap-2">
	            		<!-- 入力フォーム -->
	                    <input type="search" name="keyword" th:value="${keyword}" class="form-control w-50" th:placeholder="#{placeholder.admin.user.list.nameOrEmail}">
	                	<!-- 検索ボタン -->
	                    <button type="submit" class="btn btn-dark text-nowrap" th:text="#{btn.admin.user.list.search}"></button>
	            	</div>
                	
	            </form>
	        </div>
			
	                <table class="table table-bordered table-hover align-middle bg-white shadow-sm">
	                    <thead class="table-dark">
	                        <tr>
	                            <th class="" th:text="#{label.admin.user.list.id}"></th>
	                            <th class="" th:text="#{label.admin.user.list.name}"></th>
	                            <th class="" th:text="#{label.admin.user.list.email}"></th>
	                            <th class="" th:text="#{label.admin.user.list.detail}"></th>
	                        </tr>
	                    </thead>
	                    <tbody>
	                        <tr th:each="user : ${userList}">
	                            <td class="" th:text="${user.id}"></td>
	                            
	                            <td th:text="${user.name}"></td>
	                            
	                            <td th:text="${user.email}"></td>
	                            
	                            <td class="text-center">
	                                <a th:href="@{/admin/user/detail/{id}(id=${user.id})}" class="btn btn-primary btn-sm px-3" th:text="#{btn.admin.user.list.detail}"></a>
	                            </td>
	                        </tr>
	                        
	                        <tr th:if="${#lists.isEmpty(userList)}">
	                            <td colspan="4" class="text-center text-muted py-4">
	                                一般ユーザーは登録されていません。
	                            </td>
	                        </tr>
	                    </tbody>
	                </table>
	        
	        <nav aria-label="一般ユーザー一覧ページナビゲーション" th:if="${totalPages > 0}" class="mt-5">
	            <ul class="pagination justify-content-center d-flex gap-1">
	                
	                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
	                    <a class="page-link text-dark border-dark rounded-1" th:href="@{/admin/user/list(keyword=${keyword}, page=${currentPage - 1})}">前へ</a>
	                </li>
	                
	                <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}" 
	                    th:classappend="${i == currentPage} ? 'active'">
	                    <a class="page-link text-dark border-dark rounded-1" 
	                       th:href="@{/admin/user/list(keyword=${keyword}, page=${i})}" 
	                       th:text="${i + 1}"></a>
	                </li>
	                
	                <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
	                    <a class="page-link text-dark border-dark rounded-1" th:href="@{/admin/user/list(keyword=${keyword}, page=${currentPage + 1})}">次へ</a>
	                </li>
	            </ul>
	        </nav>
	        
	        <div class="mt-4 text-center">
	            <a th:href="@{/admin/goods/index}" class="btn btn-outline-dark px-4" th:text="#{btn.admin.user.list.back}"></a>
	        </div>
    	</div>
    </main>
</body>
</html>
