<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">
<head>
    <title>販売履歴一覧(管理者)</title>
</head>
<body>

    <main layout:fragment="content" class="container my-5">
        
        <h1 class="h2 fw-bold mb-4 border-bottom pb-2">販売履歴一覧</h1>

        <form th:action="@{/admin/order/list}" method="get" class="mb-4">
            <div class="row g-2">
                <div class="col-md-4">
                    <input type="text" name="keyword" th:value="${keyword}" class="form-control" placeholder="購入者名 または 購入日(yyyy/MM/dd)">
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-dark">検索</button>
                </div>
            </div>
        </form>

        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <table class="table table-bordered table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr class="text-center">
                            <th>購入日</th><th>購入者</th><th>合計金額</th>
                            <th>画像</th><th>購入商品名</th><th>単価</th><th>個数</th>
                        </tr>
                    </thead>
                    <tbody>
                        <th:block th:each="viewItem : ${orderList}">
                            <tr th:each="item, itemStat : ${viewItem.details}">
                                <td th:if="${itemStat.first}" th:rowspan="${#lists.size(viewItem.details)}" class="text-center"
                                    th:text="${#temporals.format(viewItem.order.orderedAt, 'yyyy/MM/dd')}"></td>
                                <td th:if="${itemStat.first}" th:rowspan="${#lists.size(viewItem.details)}"
                                    th:text="${viewItem.order.orderedName}"></td>
                                <td th:if="${itemStat.first}" th:rowspan="${#lists.size(viewItem.details)}" class="text-end"
                                    th:text="${#numbers.formatInteger(viewItem.order.totalPrice, 1, 'COMMA') + '円'}"></td>
                                
                                    <td class="text-center">
									    <img th:if="${#strings.startsWith(item.orderedImage, '/')}"
									         th:src="@{/images{path}(path=${item.orderedImage})}" 
									         class="img-thumbnail"
									         style="width: 50px; height: auto;" alt="商品画像">
									
									    <img th:unless="${#strings.startsWith(item.orderedImage, '/')}"
									         th:src="@{/uploaded-images/{fileName}(fileName=${item.orderedImage})}" 
									         class="img-thumbnail"
									         style="width: 50px; height: auto;" alt="商品画像">
									</td>
                                <td th:text="${item.orderedName}"></td>
                                <td class="text-end" th:text="${#numbers.formatInteger(item.orderedPrice, 1, 'COMMA') + '円'}"></td>
                                <td class="text-center" th:text="${item.quantity}"></td>
                            </tr>
                        </th:block>
                    </tbody>
                </table>
            </div>
        </div>
        
        <nav aria-label="販売履歴一覧ページナビゲーション" th:if="${totalPages > 0}" class="mt-5">
            <ul class="pagination justify-content-center d-flex gap-1">
                
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <a class="page-link text-dark border-dark rounded-1" th:href="@{/admin/order/list(page=${currentPage - 1})}">前へ</a>
                </li>
                
                <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}" 
                    th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link text-dark border-dark rounded-1" 
                       th:href="@{/admin/order/list(page=${i})}" 
                       th:text="${i + 1}"></a>
                </li>
                
                <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                    <a class="page-link text-dark border-dark rounded-1" th:href="@{/admin/order/list(page=${currentPage + 1})}">次へ</a>
                </li>
            </ul>
        </nav>
        
        <div class="mt-4 text-center">
            <a th:href="@{/admin/goods/index}" class="btn btn-outline-dark px-4">戻る</a>
        </div>
        
    </main>
</body>
</html>
