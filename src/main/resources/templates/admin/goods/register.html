<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/layout}">
<head>
<meta charset="UTF-8">
<title th:text="#{title.admin.goods.register}"></title>
</head>
<body>

	<main layout:fragment="content">
		<div class="container mt-4" style="max-width: 600px;">
			<!-- 大見出し -->
			<h2 class="text-center mb-4" th:text="#{label.admin.goods.register.title}"></h2>

			<hr class="border-2 opacity-100">

			<div class="card shadow-sm my-3">
				<div class="card-body">
					<form th:action="@{/admin/goods/register}" th:object="${goodsRegisterForm}" method="post" enctype="multipart/form-data">
						<!-- 商品名 -->
						<div class="mb-3">
							<label class="form-label"> <span th:text="#{label.admin.goods.register.name}"></span> <span class="badge bg-danger" th:text="#{label.admin.goods.register.required}"></span>
							</label> <input type="text" th:field="*{name}" th:errorclass="is-invalid" class="form-control" th:placeholder="#{placeholder.admin.goods.register.name}">
							<div class="text-danger small" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
						</div>
						<!-- 価格 -->
						<div class="mb-3">
							<label class="form-label"> <span th:text="#{label.admin.goods.register.price}"></span> <span class="badge bg-danger" th:text="#{label.admin.goods.register.required}"></span>
							</label>

							<div class="d-flex align-items-center gap-2">
								<input type="text" th:field="*{price}" th:errorclass="is-invalid" class="form-control w-50" th:placeholder="#{placeholder.admin.goods.register.price}"> <span class="fw-bold" th:text="#{common.label.yen}"></span>
							</div>

							<div class="text-danger small mt-1" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
						</div>
						<!-- 商品画像 -->
						<div class="mb-3">
							<label for="imageFile" class="form-label"> <span th:text="#{label.admin.goods.register.image}"></span> <span class="badge bg-danger" th:text="#{label.admin.goods.register.required}"></span>
							</label> <input type="file" th:field="*{imageFile}" id="imageFile" class="form-control" th:errorclass="is-invalid" accept="image/*">
							<div class="invalid-feedback" th:errors="*{imageFile}"></div>
						</div>
						<!-- 商品説明 -->
						<div class="mb-3">
							<label class="form-label"> <span th:text="#{label.admin.goods.register.description}"></span> <span class="badge bg-danger" th:text="#{label.admin.goods.register.required}"></span>
							</label>
							<textarea th:field="*{description}" th:errorclass="is-invalid" class="form-control" rows="4" th:placeholder="#{placeholder.admin.goods.register.description}"></textarea>
							<div class="text-danger small" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
						</div>
						<!-- カテゴリ -->
						<div class="mb-4">
							<label class="form-label"> <span th:text="#{label.admin.goods.register.category}"></span> <span class="badge bg-danger" th:text="#{label.admin.goods.register.required}"></span>
							</label> <select th:field="*{categoryId}" th:errorclass="is-invalid" class="form-select">
								<option value="" th:text="#{option.admin.goods.register.categoryDefault}"></option>
								<option th:each="category : ${categories}" th:value="${category.id}" th:text="${category.name}"></option>
							</select>
							<div class="text-danger small" th:if="${#fields.hasErrors('categoryId')}" th:errors="*{categoryId}"></div>
						</div>
						<!-- 戻る・登録ボタン -->
						<div class="d-flex justify-content-center gap-3 mt-4">
							<a th:href="@{/admin/goods/index}" class="btn btn-outline-secondary px-4 py-2" th:text="#{btn.admin.goods.register.back}"></a>
							<button type="submit" class="btn btn-primary px-4 py-2" th:text="#{btn.admin.goods.register.submit}"></button>
						</div>
					</form>
				</div>
			</div>
		</div>
	</main>
</body>
</html>
