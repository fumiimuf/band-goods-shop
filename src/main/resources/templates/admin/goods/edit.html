<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">
<head>
    <meta charset="UTF-8">
    <title th:text="#{title.admin.goods.edit}"></title>
</head>
<body>

<main layout:fragment="content">
    <div class="container mt-5" style="max-width: 600px;">
        <div class="card shadow-sm">
            <div class="card-body">
                <h2 class="card-title mb-4" th:text="#{label.admin.goods.edit.title}"></h2>
                
                <form th:action="@{/admin/goods/update}" 
                      th:object="${goodsEditForm}" 
                      method="post" 
                      enctype="multipart/form-data">
                    
                    <input type="hidden" th:field="*{id}">
                    
                    <div class="mb-3">
                        <label class="form-label">
	                        <span th:text="#{label.admin.goods.edit.name}"></span>
	                        <span class="badge bg-danger" th:text="#{label.admin.goods.edit.required}"></span>
                        </label>
                        <input type="text" 
                        		th:field="*{name}" 
                        		class="form-control" 
                        		th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : 'is-valid'">
                        <div class="text-danger small" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
	                        <span th:text="#{label.admin.goods.edit.price}"></span>
	                        <span class="badge bg-danger" th:text="#{label.admin.goods.edit.required}"></span>
                        </label>
                        <div class="d-flex align-items-center gap-2">
                            <input type="text" 
                            		th:field="*{price}" 
                            		class="form-control w-50"
                            		th:classappend="${#fields.hasErrors('price')} ? 'is-invalid' : 'is-valid'">
                            <span>円</span>
                        </div>
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
	                        <span th:text="#{label.admin.goods.edit.image}"></span>
	                        <span class="badge bg-secondary" th:text="#{label.admin.goods.edit.optional}"></span>
                        </label>
                        <input type="file" 
                        		th:field="*{imageFile}" 
                        		class="form-control" 
                        		th:classappend="${#fields.hasErrors('imageFile')} ? 'is-invalid' : 'is-valid'" 
                        		accept="image/*">
                        <div class="text-muted small mt-1">※変更する場合のみ選択してください。</div>
                        <div class="text-danger small" th:if="${#fields.hasErrors('imageFile')}" th:errors="*{imageFile}"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                        <span th:text="#{label.admin.goods.edit.description}"></span>
                        <span class="badge bg-danger" th:text="#{label.admin.goods.edit.required}"></span>
                        </label>
                        <textarea th:field="*{description}" 
                        			class="form-control" 
                        			th:classappend="${#fields.hasErrors('description')} ? 'is-invalid' : 'is-valid'"
                        			rows="4" ></textarea>
                        <div class="text-danger small" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
	                        <span th:text="#{label.admin.goods.edit.category}"></span>
	                        <span class="badge bg-danger" th:text="#{label.admin.goods.edit.required}"></span>
                        </label>
                        <select th:field="*{categoryId}" 
                        		class="form-select"
                        		th:classappend="${#fields.hasErrors('categoryId')} ? 'is-invalid' : 'is-valid'">
                            <option th:each="category : ${categories}" th:value="${category.id}" th:text="${category.name}"></option>
                        </select>
                        <div class="text-danger small" th:if="${#fields.hasErrors('categoryId')}" th:errors="*{categoryId}"></div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">
	                        <span th:text="#{label.admin.goods.edit.status}"></span>
	                        <span class="badge bg-danger" th:text="#{label.admin.goods.edit.required}"></span>
                        </label>
                        <select th:field="*{isDeleted}"
                        		class="form-select" 
                        		th:classappend="${#fields.hasErrors('isDeleted')} ? 'is-invalid' : 'is-valid'">
                        		
                            <option th:value="false" th:text="#{option.admin.goods.edit.statusActive}"></option>
                            <option th:value="true" th:text="#{option.admin.goods.edit.statusSuspended}"></option>
                        </select>
                        <div class="text-danger small" th:if="${#fields.hasErrors('isDeleted')}" th:errors="*{isDeleted}"></div>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a th:href="@{/admin/goods/index}" class="btn btn-secondary" th:text="#{btn.admin.goods.edit.back}"></a>
                        <button type="submit" class="btn btn-primary" th:text="#{btn.admin.goods.edit.submit}"></button>
                    </div>
                    
                </form>
            </div>
        </div>
    </div>
</main>

</body>
</html>
