<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">
<head>
    <meta charset="UTF-8">
    <title>グッズ更新</title>
</head>
<body>

<main layout:fragment="content">
    <div class="container mt-5" style="max-width: 600px;">
        <div class="card shadow-sm">
            <div class="card-body">
                <h2 class="card-title mb-4">グッズ更新</h2>
                
                <form th:action="@{/admin/goods/update}" 
                      th:object="${goodsEditForm}" 
                      method="post" 
                      enctype="multipart/form-data"
                      th:classappend="${#fields.hasAnyErrors()} ? 'was-validated'">
                    
                    <input type="hidden" th:field="*{id}">
                    
                    <div class="mb-3">
                        <label class="form-label">商品名 <span class="badge bg-danger">必須</span></label>
                        <input type="text" th:field="*{name}" th:errorclass="is-invalid" class="form-control" placeholder="例：ツアーTシャツ2026 (Black)">
                        <div class="text-danger small" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">価格（税込） <span class="badge bg-danger">必須</span></label>
                        <div class="d-flex align-items-center gap-2">
                            <input type="text" th:field="*{price}" th:errorclass="is-invalid" class="form-control w-50" placeholder="例：3500">
                            <span>円</span>
                        </div>
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">商品画像 <span class="badge bg-secondary">任意</span></label>
                        <input type="file" th:field="*{imageFile}" class="form-control" th:classappend="${#fields.hasErrors('imageFile')} ? 'is-invalid'" accept="image/*">
                        <div class="text-muted small mt-1">※変更する場合のみ選択してください。</div>
                        <div class="text-danger small" th:if="${#fields.hasErrors('imageFile')}" th:errors="*{imageFile}"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">商品説明 <span class="badge bg-danger">必須</span></label>
                        <textarea th:field="*{description}" th:errorclass="is-invalid" class="form-control" rows="4" placeholder="商品の詳細を入力してください。"></textarea>
                        <div class="text-danger small" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">カテゴリ <span class="badge bg-danger">必須</span></label>
                        <select th:field="*{categoryId}" th:errorclass="is-invalid" class="form-select">
                            <option value="">カテゴリを選択してください</option>
                            <option th:each="category : ${categories}" th:value="${category.id}" th:text="${category.name}"></option>
                        </select>
                        <div class="text-danger small" th:if="${#fields.hasErrors('categoryId')}" th:errors="*{categoryId}"></div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">販売状態 <span class="badge bg-danger">必須</span></label>
                        <select th:field="*{isDeleted}" th:errorclass="is-invalid" class="form-select">
                            <option value="0">販売中</option>
                            <option value="1">停止中</option>
                        </select>
                        <div class="text-danger small" th:if="${#fields.hasErrors('isDeleted')}" th:errors="*{isDeleted}"></div>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a th:href="@{/admin/goods/index}" class="btn btn-secondary">戻る</a>
                        <button type="submit" class="btn btn-primary">更新</button>
                    </div>
                    
                </form>
            </div>
        </div>
    </div>
</main>

</body>
</html>
