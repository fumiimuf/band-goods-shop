<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

<!-- CSS読込 -->
<link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">

<title>グッズ一覧(一般ユーザー)</title>
</head>
<body>

	<div class="container my-5" style="max-width: 900px;">
		<h1 class="mb-4">グッズ一覧</h1>

		<hr>

		<div class="row row-cols-1 row-cols-md-4 g-4">
			<div class="col" th:each="goods : ${goodsList}">
				<div class="card h-100 shadow-sm">
					<!-- 商品画像 -->
					<img th:src="${goods.image}" class="card-img-top" alt="商品画像" style="height: 150px; object-fit: cover; background: #eee;">

					<div class="card-body">
						<!-- 商品名 -->
						<h5 class="card-title" th:text="${goods.name}">商品名</h5>
						<!-- 価格 -->
						<p class="card-text text-danger mb-0" th:text="|¥ ${goods.price}|">\0</p><!-- リテラル置換で価格を表示 -->
						<!-- カテゴリ -->
						<span class="badge rounded-pill bg-secondary fw-light mb-3" th:text="${goods.categoryName}"></span>
						<div class="d-flex gap-1">
							<!-- 商品説明ボタン -->
							<button type="button" 
									class="btn btn-outline-secondary btn-sm flex-fill text-nowrap" 
									style="font-size: 0.75rem; padding: 0.25rem 0.1rem;" 
									data-bs-toggle="popover" 
									data-bs-placement="top" 
									data-bs-container="body"
									th:data-bs-title="${goods.name}" 
									th:data-bs-content="${goods.description}">
								商品説明
							</button>
							<!-- カートに入れるボタン -->
							<form th:action="@{/cart/add}" method="post">
								<input type="hidden" name="goodsId" th:value="${goods.id}">
							 
								<button type="submit" class="btn btn-primary btn-sm flex-fill text-nowrap" 
										style="font-size: 0.75rem; padding: 0.25rem 0.1rem;">
									カートに入れる
								</button>
							</form>
							
						</div>
					</div>
				</div>
			</div>
		</div>
		<nav aria-label="Page navigation" class="mt-5">
			<ul class="pagination justify-content-center">
				<li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'"><a class="page-item page-link" th:href="@{/goods(page=${currentPage - 1})}">前へ</a></li>

				<li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}" th:classappend="${i == currentPage} ? 'active'"><a class="page-link" th:href="@{/goods(page=${i})}" th:text="${i + 1}"></a></li>

				<li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'"><a class="page-link" th:href="@{/goods(page=${currentPage + 1})}">次へ</a></li>
			</ul>
		</nav>
	</div>

	<!-- jQuery読込 -->
	<script th:src="@{/webjars/jquery/jquery.min.js}" defer></script>
	<!-- JS読込 -->
	<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}" defer></script>
	<!-- 自分のjsファイルの読込 -->
	<script th:src="@{/js/common.js}" defer></script>
</body>
</html>
