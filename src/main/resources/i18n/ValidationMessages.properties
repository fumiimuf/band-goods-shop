# ==========================================
# バリデーションエラーメッセージ
# ==========================================

# RegisterForm
NotBlank={0}は必須項目です。

NotNull={0}は必須項目です。

Email=メールアドレスの形式が正しくありません

Size={0}は{1}文字以下で入力してください。

Range=数量は半角数字で10以下で選択してください。

Pattern.password={0}は半角英数字で8文字以上で入力してください。

Pattern.zipCode={0}はハイフンを含めた半角数字「000-0000」形式で入力してください。

# GoodsForm
NotBlank.goodsForm.goodsName=商品名は必須項目です。
Size.goodsForm.goodsName=商品名は50文字以内で入力してください。

NotNull.goodsForm.price=価格は必須項目です。
Min.goodsForm.price=価格は半角数字で0以上で入力してください。

NotNull.goodsForm.imageFile=商品画像を選択してください。

NotBlank.goodsForm.description=商品説明は必須項目です。
Size.goodsForm.description=商品説明は500文字以内で入力してください。

NotNull.goodsForm.categoryId=カテゴリを選択してください。

# ==========================================
# メールアドレスの重複メッセージ
# ==========================================
error.duplicate.email=このメールアドレスは既に登録されています。