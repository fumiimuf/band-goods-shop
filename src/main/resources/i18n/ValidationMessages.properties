# ==========================================
# バリデーションエラーメッセージ
# ==========================================
NotBlank={0}は必須項目です。

NotNull={0}は必須項目です。

Email=メールアドレスの形式が正しくありません

Size={0}は{1}文字以下で入力してください。

Range=数量は半角数字で10以下で選択してください。

Min={0}は半角数字で{1}以上で入力してください。

Pattern.password={0}は半角英数字で8文字以上で入力してください。

Pattern.zipCode={0}はハイフンを含めた半角数字「000-0000」形式で入力してください。

# ==========================================
# メールアドレスの重複メッセージ
# ==========================================
error.duplicate.email=このメールアドレスは既に登録されています。

# ==========================================
# 画像サイズエラーメッセージ
# ==========================================
error.imageFile.size=画像サイズは600px×600px以内に指定してください。
# ==========================================

# 型変換（タイプミスマッチ）エラーメッセージ

# ==========================================

typeMismatch.java.lang.Integer=半角数字で入力してください。